<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>81p</title>
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body class="page-account-leave">
    <div class="leave-app">
      <header class="leave-topbar">
        <a class="leave-brand" href="#">
          <img src="../image/logo.svg" alt="Haon BIOSOLUTIONS" />
          <span class="brand-name">CROTREE</span>
        </a>
        <div class="leave-top-actions">
          <div class="bell-wrap">
            <a href="#" aria-label="notification">
              <img src="../image/icon-bell.svg" alt="" />
            </a>
            <span class="badge">1</span>
          </div>
          <a class="avatar" href="#" aria-label="profile">
            <img src="../image/icon-user.svg" alt="" />
          </a>
        </div>
      </header>

      <main class="leave-main">
        <i class="icon-biglogo"></i>
        <p class="leave-title">Please Review Before Leaving CROTREE.</p>
        <section class="leave-warning-box" aria-label="Warning">
          <i class="icon-warning"></i>
          <ul class="leave-warning-list">
            <li>If you delete your account, all active services will be closed, and all data will be permanently deleted and cannot be recovered.</li>
            <li>All information, including personal data and chat history, will be deleted.</li>
          </ul>
        </section>
        <label class="leave-check-row">
          <input type="checkbox" />
          <span class="leave-check-ui"></span>
          <span>I have read and agree to all the information provided.</span>
        </label>
        <p class="leave-action">
          <button type="button" class="abi-save-btn">Delete Account</button>
        </p>
      </main>
    </div>
  </body>
</html>
