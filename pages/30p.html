<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>30p</title>
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-toggle-wrap">
          <button type="button" class="sidebar-toggle" title="Toggle sidebar">
            <img src="../image/icon-btn.svg" alt="" />
          </button>
        </div>
        <div class="sidebar-body">
          <a class="brand" href="#">
            <img src="../image/logo.svg" alt="Haon BIOSOLUTIONS" />
            <span class="brand-name">CROTREE</span>
          </a>
          <nav class="nav">
            <ul>
              <li>
                <a href="#">
                  <img class="nav-icon"src="../image/menubar/icon-dashboard.svg" alt=""/>
                  <span>Dashboard</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-clients.svg" alt=""/>
                  <span>Clients</span>
                </a>
              </li>
              <li>
                <a class="active" href="#">
                  <img class="nav-icon" src="../image/menubar/icon-project.svg" alt=""/>
                  <span>Projects</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-testprep.svg" alt=""/>
                  <span>Test Prep</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-logs.svg" alt=""/>
                  <span>Logs</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-chat.svg" alt=""/>
                  <span>Chat</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-qa.svg" alt=""/>
                  <span>QA Comment</span>
                </a>
              </li>
            </ul>
          </nav>

          <div class="sidebar-foot">
            <a class="logout" href="#">
              <img src="../image/icon-logout.svg" alt="" />
              <span>Logout</span> 
            </a>
          </div>
        </div>
      </aside>
      <div class="main">
        <header class="topbar">
          <div class="bell-wrap">
            <a href="#" aria-label="notification">
              <img src="../image/icon-bell.svg" alt="" />
            </a>
            <span class="badge">2</span>
          </div>
          <a class="avatar" href="#" aria-label="profile">
            <img src="../image/icon-user.svg" alt="" />
          </a>
        </header>
        <main class="content">
          <section class="test-article-head">
            <h1>Test Article</h1>
            <p>A Test Article is the substance, product, or equipment used as the subject of a test or experiment.</p>
          </section>

          <section class="test-article-form">
            <div class="ta-grid">
              <div class="ta-row"><label>Sample ID <i class="icon-item"></i></label><div class="ta-field"><p class="ta-static-value">A123345</p></div></div>
              <div class="ta-row"><label>Test Description</label><div class="ta-field"><input placeholder="Enter Text" /></div></div>
              <div class="ta-row"><label>name <i class="icon-item"></i></label><div class="ta-field"><input placeholder="Enter Text" /></div></div>
              <div class="ta-row"><label>Test Article</label><div class="ta-field"><input placeholder="Enter Text" /></div></div>
              <div class="ta-row"><label>Necessary [mg] <i class="icon-item"></i></label><div class="ta-field"><input value="0.000" /></div></div>
              <div class="ta-row"><label>Volume [mL/Vial] <i class="icon-item"></i></label><div class="ta-field"><input value="0.000" /></div></div>
              <div class="ta-row"><label>Recombinant Gene [Y/N] <i class="icon-item"></i></label><div class="ta-field"><select><option>Select</option></select></div></div>
              <div class="ta-row"><label>Received [Vials] <i class="icon-item"></i></label><div class="ta-field"><input value="0" /></div></div>
              <div class="ta-row"><label>Purity[%]</label><div class="ta-field"><input value="0.000" /></div></div>
              <div class="ta-row"><label>Label Number <i class="icon-item"></i></label><div class="ta-field"><input placeholder="Enter Text" /></div></div>
              <div class="ta-row"><label>Bio Safety Level <i class="icon-item"></i></label><div class="ta-field"><select><option>Select</option></select></div></div>
              <div class="ta-row"><label>Storage Conditions <i class="icon-item"></i></label><div class="ta-field"><input value="0" /></div></div>
              <div class="ta-row"><label>Conc. [mg/mL] <i class="icon-item"></i></label><div class="ta-field"><input value="0.000" /></div></div>
              <div class="ta-row ta-row-warn">
                <label>used [vials] <i class="icon-item"></i></label>
                <div class="ta-field">
                  <input value="0" />
                  <p class="ta-warn">*Used [Vials] Cannot Exceed The Number Of Received [Vials].</p>
                </div>
              </div>
            </div>
          </section>

          <div class="ta-actions">
            <button type="button" class="btn-delete">delete</button>
            <div class="ta-actions-right">
              <button type="button" class="btn-cancel">Cancel</button>
              <button type="button" class="btn-save">Save</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../js/sidebar-toggle.js"></script>
  </body>
</html>
