          <!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>38p</title>
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-toggle-wrap">
          <button type="button" class="sidebar-toggle" title="Toggle sidebar">
            <img src="../image/icon-btn.svg" alt="" />
          </button>
        </div>
        <div class="sidebar-body">
          <a class="brand" href="#">
            <img src="../image/logo.svg" alt="Haon BIOSOLUTIONS" />
            <span class="brand-name">CROTREE</span>
          </a>
          <nav class="nav">
            <ul>
              <li>
                <a href="#">
                  <img class="nav-icon"src="../image/menubar/icon-dashboard.svg" alt=""/>
                  <span>Dashboard</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-clients.svg" alt=""/>
                  <span>Clients</span>
                </a>
              </li>
              <li>
                <a class="active" href="#">
                  <img class="nav-icon" src="../image/menubar/icon-project.svg" alt=""/>
                  <span>Projects</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-testprep.svg" alt=""/>
                  <span>Test Prep</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-logs.svg" alt=""/>
                  <span>Logs</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-chat.svg" alt=""/>
                  <span>Chat</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img class="nav-icon" src="../image/menubar/icon-qa.svg" alt=""/>
                  <span>QA Comment</span>
                </a>
              </li>
            </ul>
          </nav>

          <div class="sidebar-foot">
            <a class="logout" href="#">
              <img src="../image/icon-logout.svg" alt="" />
              <span>Logout</span> 
            </a>
          </div>
        </div>
      </aside>
      <div class="main">
        <header class="topbar">
          <div class="bell-wrap">
            <a href="#" aria-label="notification">
              <img src="../image/icon-bell.svg" alt="" />
            </a>
            <span class="badge">2</span>
          </div>
          <a class="avatar" href="#" aria-label="profile">
            <img src="../image/icon-user.svg" alt="" />
          </a>
        </header>
        <main class="content">
          <section class="tp-head">
            <h1>Equipment &amp; Material - Animal</h1>
            <p>Section for managing equipment, materials, and animal information required for experiments.</p>
          </section>

          <section class="test-article-form">
            <div class="ta-grid em-animal-grid">
              <div class="ta-row">
                <label>Animal <i class="icon-item"></i></label>
                <div class="ta-field"><input type="text" placeholder="Enter Text" /></div>
              </div>
              <div class="ta-row">
                <label>Number of Female</label>
                <div class="ta-field"><input type="text" value="0" /></div>
              </div>
              <div class="ta-row">
                <label>Species <i class="icon-item"></i></label>
                <div class="ta-field"><input type="text" placeholder="Enter Text" /></div>
              </div>
              <div class="ta-row">
                <label>Pregnancy Status</label>
                <div class="ta-field"><select><option>select</option></select></div>
              </div>
              <div class="ta-row">
                <label>Strain</label>
                <div class="ta-field"><input type="text" placeholder="Enter Text" /></div>
              </div>
              <div class="ta-row">
                <label>Number of Male</label>
                <div class="ta-field"><input type="text" value="0" /></div>
              </div>
              <div class="ta-row">
                <label>Source</label>
                <div class="ta-field"><input type="text" placeholder="Enter Text" /></div>
              </div>
              <div class="ta-row">
                <label>Health Status</label>
                <div class="ta-field"><select><option>select</option></select></div>
              </div>
              <div class="ta-row">
                <label>Age [Weeks]</label>
                <div class="ta-field"><input type="text" value="0" /></div>
              </div>
              <div class="ta-row">
                <label>Acclimatization [Days]</label>
                <div class="ta-field"><input type="text" value="0" /></div>
              </div>
              <div class="ta-row">
                <label>Weight [g] <i class="icon-item"></i></label>
                <div class="ta-field"><input type="text" value="0" /></div>
              </div>
              <div class="ta-row">
                <label>Housing and Care Conditions <i class="icon-item"></i></label>
                <div class="ta-field"><input type="text" value="0" /></div>
              </div>
            </div>
          </section>

          <div class="ta-actions">
            <button type="button" class="btn-delete">delete</button>
            <div class="ta-actions-right">
              <button type="button" class="btn-cancel">Cancel</button>
              <button type="button" class="btn-save">Save</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="../js/sidebar-toggle.js"></script>
  </body>
</html>
