<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CROTREE</title>
    <link rel="stylesheet" href="../css/layout.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-toggle-wrap">
          <button type="button" class="sidebar-toggle" title="Toggle sidebar">
            <img src="../image/icon-btn.svg" alt="" />
          </button>
        </div>

        <div class="sidebar-body">
          <a class="brand" href="#">
            <img src="../image/logo.svg" alt="Haon BIOSOLUTIONS" />
            <span class="brand-name">CROTREE</span>
          </a>

          <nav class="nav">
            <ul>
              <li>
                <a class="active" href="#">
                  <img
                    class="nav-icon"
                    src="../image/menubar/icon-dashboard.svg"
                    alt=""
                  />
                  <span>Dashboard</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img
                    class="nav-icon"
                    src="../image/menubar/icon-clients.svg"
                    alt=""
                  />
                  <span>Clients</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img
                    class="nav-icon"
                    src="../image/menubar/icon-project.svg"
                    alt=""
                  />
                  <span>Projects</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img
                    class="nav-icon"
                    src="../image/menubar/icon-testprep.svg"
                    alt=""
                  />
                  <span>Test Prep</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img
                    class="nav-icon"
                    src="../image/menubar/icon-logs.svg"
                    alt=""
                  />
                  <span>Logs</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img
                    class="nav-icon"
                    src="../image/menubar/icon-chat.svg"
                    alt=""
                  />
                  <span>Chat</span>
                </a>
              </li>
              <li>
                <a href="#">
                  <img
                    class="nav-icon"
                    src="../image/menubar/icon-qa.svg"
                    alt=""
                  />
                  <span>QA Comment</span>
                </a>
              </li>
            </ul>
          </nav>

          <div class="sidebar-foot">
            <a class="logout" href="#"
              ><img src="../image/icon-logout.svg" alt="" />Logout</a
            >
          </div>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <div class="bell-wrap">
            <a href="#" aria-label="notification">
              <img src="../image/icon-bell.svg" alt="" />
            </a>
            <span class="badge">2</span>
          </div>
          <a class="avatar" href="#" aria-label="profile">
            <img src="../image/icon-user.svg" alt="" />
          </a>
        </header>
      </div>
    </div>
    <script src="../js/sidebar-toggle.js"></script>
  </body>
</html>
