<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>54p</title>
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body class="signature-modal-page">
    <main class="signature-modal">
      <header class="signature-modal-head">
        <h1 class="signature-modal-title">Signature</h1>
        <button type="button" class="signature-modal-close" aria-label="Close">
          <i class="icon-close"></i>
        </button>
      </header>
      <div class="signature-pad">
        <span class="signature-pad-hint">Sign here</span>
      </div>
      <div class="signature-toolbar">
        <div class="signature-toolbar-left">
          <button type="button" class="signature-tool-btn">
            <i class="icon-back"></i>
            <span>Back</span>
          </button>
          <span class="signature-toolbar-sep" aria-hidden="true">|</span>
          <button type="button" class="signature-tool-btn">
            <i class="icon-erase"></i>
            <span>erase</span>
          </button>
        </div>
      </div>
      <div class="signature-apply-row">
        <button type="button" class="signature-btn-apply">Apply</button>
      </div>
    </main>
  </body>
</html>
